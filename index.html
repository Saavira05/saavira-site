<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saavira — Your Everyday Style</title>

  <link rel="ts.googleapis.com
  <link rel="preconnect" href="https://fonts.gstatic.comgoogleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheeted to work on GitHub Pages) -->
  <style>
    :root {
      --header:70px;
      --primary:#7a163b;
      --accent:#caa75a;
      --border:#e5e7eb;
      --muted:#6b7280;
      --surface:#fafafa;
      --shadow:0 8px 20px rgba(0,0,0,0.06);
      --max:1100px;
    }

    *{box-sizing:border-box}
    body {
      margin:0;
      font-family:Inter, sans-serif;
      background:white;
      color:#1a1a1a;
      line-height:1.6;
    }
    h1,h2,h3 {
      font-family:"Playfair Display", serif;
      margin:0 0 .5rem;
    }
    a { color:var(--primary); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .container { width:min(var(--max), 92%); margin:auto; }

    /* HEADER */
    .site-header {
      position:sticky; top:0; z-index:20;
      height:var(--header);
      background:#fff;
      border-bottom:1px solid var(--border);
    }
    .header-inner {
      display:flex; align-items:center; justify-content:space-between;
      height:var(--header);
    }
    .brand {
      display:flex; align-items:center; gap:.6rem;
    }
    .brand img {
      height:38px; width:auto;
    }
    .brand-title {
      font-weight:700; color:#333;
    }
    nav ul {
      list-style:none; display:flex; gap:1rem; margin:0; padding:0;
    }
    nav a { padding:.45rem .75rem; }

    /* HERO */
    .hero {
      padding:3rem 0;
      background:linear-gradient(135deg,#fff7fb,#fff);
      border-bottom:1px solid var(--border);
    }
    .hero p { color:var(--muted); }

    /* SECTIONS */
    .section { padding:3rem 0; scroll-margin-top:85px; }
    .section.alt {
      background:var(--surface);
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
    }

    .grid { display:grid; gap:1.6rem; }
