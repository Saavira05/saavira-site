  <style>
    :root{
      --header-h:70px;
      --bg:#ffffff; --text:#1a1a1a; --muted:#6b7280;
      --primary:#7a163b; --accent:#caa75a; --border:#e5e7eb;
      --surface:#fafafa; --shadow:0 10px 20px rgba(0,0,0,.06);
      --max-w:1120px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:var(--bg);line-height:1.6}
    h1,h2,h3{font-family:"Playfair Display",Georgia,"Times New Roman",serif;line-height:1.25;margin:0 0 .5rem}
    h1{font-size:clamp(2rem,3vw + 1rem,3.25rem)}
    h2{font-size:clamp(1.5rem,1.6vw + 1rem,2.1rem)}
    h3{font-size:1.1rem}
    p{margin:.75rem 0;color:#2b2b2b}
    a{color:var(--primary);text-decoration:none}
    a:hover{text-decoration:underline}
    .container{width:min(var(--max-w), 92%); margin-inline:auto}

    /* ===== Header / Nav ===== */
    .site-header{
      position:sticky; top:0; z-index:20; background:#fff;
      border-bottom:1px solid var(--border); height:var(--header-h);
    }
    .header-inner{
      height:var(--header-h);
      display:flex; align-items:center; justify-content:space-between;
      gap:1rem;
    }
    .brand{display:flex; align-items:center; gap:.6rem; min-width:120px}
    .brand img{display:block; height:36px; width:auto}
    .brand-title{font-weight:700; letter-spacing:.2px; color:#2b2b2b}
