<!DOCTYPE html>
<html>

<head>
<title>Your Cart | Saavira</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">SAAVIRA</div>

<nav>
<a href="index.html">Home</a>
</nav>

</header>

<section class="section">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<button onclick="checkout()">Checkout on WhatsApp</button>

</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartDiv = document.getElementById("cart-items");

cart.forEach(item => {

let p = document.createElement("p");

p.innerText = item;

cartDiv.appendChild(p);

});

function checkout(){

let message = "Hello I want to order:%0A";

cart.forEach(item => {

message += item + "%0A";

});

window.open("https://wa.me/918980962864?text=" + message);

}

</script>

</body>
</html>
